name: Publish Fedora Toolchain Base Image
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-image.yml
      - src/fedora-base/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./src/fedora-base
          push: true
          tags: |
            ghcr.io/kraxen72/fedora-toolchain-base:latest
